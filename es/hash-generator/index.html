<body>
  <div class="container">
    <h1>Generador de Hash (MD5/SHA)</h1>
    <p class="description">Genera hashes MD5 y SHA256 para tus cadenas. Perfecto para comprobaciones de suma de verificación y controles de seguridad.</p>
    
    <form id="hashForm">
      <label for="inputText">Escribe el texto:</label>
      <input type="text" id="inputText" placeholder="Escribe o pega aquí..." required>
      <select id="hashType">
        <option value="md5">MD5</option>
        <option value="sha256">SHA-256</option>
      </select>
      <button onclick="generateHash()">Generar Hash</button>
    </form>
    
    <div class="output" id="output"></div>
  </div>

  <script>
    function generateHash() {
      const inputText = document.getElementById('inputText').value;
      const hashType = document.getElementById('hashType').value;

      fetch('/generate-hash', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: inputText, type: hashType })
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById('output').innerText = `Hash: ${data.hash}`;
      })
      .catch(error => {
        alert('Error generando hash: ' + error);
      });
    }
  </script>
