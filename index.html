<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>toolhub.software — Free Online Developer Tools</title>
  <meta name="description" content="25+ free online developer tools — JSON formatter, password generator, Base64 encoder, regex tester and more. No signup, no tracking, instant results.">
  <meta property="og:title" content="toolhub.software — Free Online Developer Tools">
  <meta property="og:description" content="25+ free online tools for developers. Fast, private, no signup required.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://toolhub.software/">
  <link rel="canonical" href="https://toolhub.software/">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "toolhub.software",
    "url": "https://toolhub.software",
    "description": "Free online developer tools — fast, private, no signup.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://toolhub.software/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
      --accent-hover: #79c0ff; --green: #3fb950; --card-hover: #1c2129;
    }
    [data-theme="light"] {
      --bg: #f6f8fa; --surface: #ffffff; --border: #d0d7de;
      --text: #1f2328; --text-muted: #656d76; --accent: #0969da;
      --accent-hover: #0550ae; --green: #1a7f37; --card-hover: #f3f4f6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }

    .header { padding: 2rem 1.5rem 1rem; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--text); }
    .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 0.75rem; align-items: center; }
    .lang-select { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 0.4rem 0.6rem; border-radius: 6px; font-size: 0.85rem; cursor: pointer; }
    .theme-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.7rem; border-radius: 6px; cursor: pointer; font-size: 1rem; }

    .hero { text-align: center; padding: 2rem 1.5rem 1.5rem; max-width: 700px; margin: 0 auto; }
    .hero h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
    .hero p { color: var(--text-muted); font-size: 1.1rem; }

    .search-wrap { max-width: 600px; margin: 1.5rem auto; padding: 0 1.5rem; }
    .search-wrap input { width: 100%; padding: 0.75rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; outline: none; }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--text-muted); }

    .filters { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; padding: 0.5rem 1.5rem 1rem; max-width: 800px; margin: 0 auto; }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); padding: 0.35rem 0.85rem; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: all 0.15s; }
    .filter-btn:hover, .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 3rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; transition: all 0.15s; cursor: pointer; display: block; }
    .card:hover { border-color: var(--accent); background: var(--card-hover); transform: translateY(-2px); }
    .card-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .card h3 { font-size: 1rem; margin-bottom: 0.3rem; color: var(--text); }
    .card p { font-size: 0.85rem; color: var(--text-muted); }
    .card-meta { margin-top: 0.6rem; display: flex; gap: 0.5rem; }
    .tag { font-size: 0.7rem; background: var(--bg); padding: 0.15rem 0.5rem; border-radius: 10px; color: var(--text-muted); }

    .footer { text-align: center; padding: 2rem 1.5rem; color: var(--text-muted); font-size: 0.85rem; border-top: 1px solid var(--border); max-width: 1200px; margin: 0 auto; }
    .footer a { color: var(--text-muted); margin: 0 0.5rem; }
    .footer a:hover { color: var(--accent); }

    .no-results { text-align: center; padding: 3rem; color: var(--text-muted); display: none; }

    @media (max-width: 600px) {
      .hero h1 { font-size: 1.6rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
  <script defer data-domain="toolhub.software" src="https://plausible.io/js/script.js"></script>
</head>
<body>
  <header class="header">
    <div class="logo">Dev<span>Util</span>.io</div>
    <div class="header-actions">
      <select class="lang-select" onchange="switchLang(this.value)">
        <option value="">🇬🇧 English</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="it">🇮🇹 Italiano</option>
      </select>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>
  </header>

  <section class="hero">
    <h1>Free Online Developer Tools</h1>
    <p>25+ tools — fast, private, no signup. Just use them.</p>
  </section>

  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search tools..." oninput="filterTools()">
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="developer">Developer</button>
    <button class="filter-btn" data-cat="text">Text</button>
    <button class="filter-btn" data-cat="encoding">Encoding</button>
    <button class="filter-btn" data-cat="data">Data</button>
    <button class="filter-btn" data-cat="security">Security</button>
    <button class="filter-btn" data-cat="media">Media</button>
  </div>

  <div class="grid" id="grid"></div>
  <div class="no-results" id="no-results">No tools found. Try a different search.</div>

  <footer class="footer">
    <p>© 2026 toolhub.software — Free tools for developers.</p>
    <p><a href="/privacy/">Privacy</a> · <a href="https://github.com/JXXR1">GitHub</a></p>
  </footer>

  <script>
    const TOOLS = [
      { slug: "json-formatter", name: "JSON Formatter", desc: "Format, beautify, and validate JSON data instantly.", icon: "{ }", cat: "developer", tags: ["json", "format", "beautify", "validate"] },
      { slug: "password-generator", name: "Password Generator", desc: "Generate strong, secure passwords with custom rules.", icon: "🔐", cat: "security", tags: ["password", "secure", "random", "generate"] },
      { slug: "qr-code-generator", name: "QR Code Generator", desc: "Create QR codes from any text or URL.", icon: "📱", cat: "media", tags: ["qr", "code", "generate", "url"] },
      { slug: "word-counter", name: "Word Counter", desc: "Count words, characters, sentences, and paragraphs.", icon: "📝", cat: "text", tags: ["word", "count", "character", "text"] },
      { slug: "base64-encoder", name: "Base64 Encoder", desc: "Encode and decode Base64 strings.", icon: "🔄", cat: "encoding", tags: ["base64", "encode", "decode"] },
      { slug: "hash-generator", name: "Hash Generator", desc: "Generate MD5, SHA-1, SHA-256 hashes from text.", icon: "🔑", cat: "security", tags: ["hash", "md5", "sha", "checksum"] },
      { slug: "url-encoder", name: "URL Encoder", desc: "Encode and decode URLs and query strings.", icon: "🔗", cat: "encoding", tags: ["url", "encode", "decode", "percent"] },
      { slug: "html-encoder", name: "HTML Encoder", desc: "Encode and decode HTML entities.", icon: "&lt;&gt;", cat: "encoding", tags: ["html", "encode", "entities", "escape"] },
      { slug: "css-minifier", name: "CSS Minifier", desc: "Minify CSS to reduce file size.", icon: "🎨", cat: "developer", tags: ["css", "minify", "compress", "optimize"] },
      { slug: "js-minifier", name: "JS Minifier", desc: "Minify JavaScript code for production.", icon: "⚡", cat: "developer", tags: ["javascript", "minify", "compress"] },
      { slug: "regex-tester", name: "Regex Tester", desc: "Test and debug regular expressions in real time.", icon: ".*", cat: "developer", tags: ["regex", "regular expression", "test", "match"] },
      { slug: "timestamp-converter", name: "Timestamp Converter", desc: "Convert between Unix timestamps and readable dates.", icon: "🕐", cat: "developer", tags: ["timestamp", "unix", "date", "convert"] },
      { slug: "uuid-generator", name: "UUID Generator", desc: "Generate random UUIDs (v4) instantly.", icon: "🆔", cat: "developer", tags: ["uuid", "guid", "random", "unique"] },
      { slug: "color-picker", name: "Color Picker", desc: "Pick colors and convert between HEX, RGB, and HSL.", icon: "🎯", cat: "media", tags: ["color", "hex", "rgb", "hsl", "picker"] },
      { slug: "lorem-ipsum", name: "Lorem Ipsum Generator", desc: "Generate placeholder text for designs and layouts.", icon: "📄", cat: "text", tags: ["lorem", "ipsum", "placeholder", "text"] },
      { slug: "case-converter", name: "Case Converter", desc: "Convert text between uppercase, lowercase, title case, and more.", icon: "Aa", cat: "text", tags: ["case", "uppercase", "lowercase", "title", "convert"] },
      { slug: "csv-to-json", name: "CSV to JSON", desc: "Convert CSV data to JSON format.", icon: "📊", cat: "data", tags: ["csv", "json", "convert", "data"] },
      { slug: "json-to-csv", name: "JSON to CSV", desc: "Convert JSON arrays to CSV format.", icon: "📋", cat: "data", tags: ["json", "csv", "convert", "export"] },
      { slug: "markdown-to-html", name: "Markdown to HTML", desc: "Convert Markdown text to HTML.", icon: "📑", cat: "developer", tags: ["markdown", "html", "convert", "render"] },
      { slug: "text-diff", name: "Text Diff", desc: "Compare two texts and highlight differences.", icon: "🔍", cat: "text", tags: ["diff", "compare", "text", "difference"] },
      { slug: "image-to-base64", name: "Image to Base64", desc: "Convert images to Base64 encoded strings.", icon: "🖼️", cat: "encoding", tags: ["image", "base64", "convert", "encode"] },
      { slug: "percentage-calculator", name: "Percentage Calculator", desc: "Calculate percentages, increases, and decreases.", icon: "%", cat: "data", tags: ["percentage", "calculate", "math"] },
      { slug: "email-validator", name: "Email Validator", desc: "Validate email address format and structure.", icon: "📧", cat: "security", tags: ["email", "validate", "check", "format"] },
      { slug: "credit-card-validator", name: "Credit Card Validator", desc: "Validate credit card numbers using the Luhn algorithm.", icon: "💳", cat: "security", tags: ["credit card", "validate", "luhn"] },
      { slug: "youtube-thumbnail", name: "YouTube Thumbnail Downloader", desc: "Download thumbnails from any YouTube video URL.", icon: "▶️", cat: "media", tags: ["youtube", "thumbnail", "download", "video"] }
    ];

    function render(tools) {
      const grid = document.getElementById('grid');
      const noResults = document.getElementById('no-results');
      if (tools.length === 0) { grid.innerHTML = ''; noResults.style.display = 'block'; return; }
      noResults.style.display = 'none';
      grid.innerHTML = tools.map(t => `
        <a class="card" href="/${t.slug}/" data-cat="${t.cat}">
          <div class="card-icon">${t.icon}</div>
          <h3>${t.name}</h3>
          <p>${t.desc}</p>
          <div class="card-meta"><span class="tag">${t.cat}</span></div>
        </a>
      `).join('');
    }

    function filterTools() {
      const q = document.getElementById('search').value.toLowerCase();
      const activeCat = document.querySelector('.filter-btn.active')?.dataset.cat || 'all';
      const filtered = TOOLS.filter(t => {
        const matchQ = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.tags.some(tag => tag.includes(q));
        const matchCat = activeCat === 'all' || t.cat === activeCat;
        return matchQ && matchCat;
      });
      render(filtered);
    }

    document.getElementById('filters').addEventListener('click', e => {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      filterTools();
    });

    function switchLang(lang) {
      window.location.href = lang ? `/${lang}/` : '/';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.querySelector('.theme-toggle').textContent = next === 'light' ? '🌙' : '☀️';
    }

    // Init
    const saved = localStorage.getItem('theme') || 'dark';
    if (saved === 'light') { document.documentElement.setAttribute('data-theme', 'light'); document.querySelector('.theme-toggle').textContent = '🌙'; }
    render(TOOLS);
  </script>
</body>
</html>
