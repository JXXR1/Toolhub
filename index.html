      {"slug": "timezone-converter", "name": "Time Zone Converter", "desc": "Convert a date and time between IANA time zones. See offsets, DST status, and weekday for both ends.", "icon": "🌍", "cat": "data", "tags": ["timezone", "tz", "convert", "utc", "date", "time", "iana"]},
      {"slug": "tip-split-calculator", "name": "Tip & Split Calculator", "desc": "Bill total + tip % + people = per-person amount. Round-up option, tip and grand total shown.", "icon": "💵", "cat": "math", "tags": ["tip", "split", "bill", "restaurant", "calculator", "people", "share"]},
      {"slug": "unicode-inspector", "name": "Unicode Inspector", "desc": "Paste text → table of every code point. Hex, decimal, UTF-8 bytes, category. Spot invisible characters.", "icon": "🔎", "cat": "text", "tags": ["unicode", "code point", "utf-8", "character", "inspect", "invisible", "encoding"]},
      {"slug": "unit-converter", "name": "Unit Converter", "desc": "Convert between metric and imperial units of length, weight, temperature, volume, and area.", "icon": "📐", "cat": "math", "tags": ["unit", "convert", "length", "weight", "temperature", "volume", "area", "metric", "imperial"]},
      {"slug": "url-encoder", "name": "URL Encoder / Decoder", "desc": "Percent-encode strings for URLs or decode percent-encoded ones back to plain text.", "icon": "🔗", "cat": "encoding", "tags": ["url", "encode", "decode", "percent", "querystring"]},
      {"slug": "url-parser", "name": "URL Parser", "desc": "Paste any URL — see the protocol, host, port, path, query parameters (decoded), hash, and origin laid out.", "icon": "🔍", "cat": "developer", "tags": ["url", "parse", "query", "host", "path", "fragment", "search params"]},
      {"slug": "uuid-generator", "name": "UUID Generator", "desc": "Generate RFC 4122 UUIDs (v4 random or v7 time-ordered). Batch up to 100. Cryptographically secure.", "icon": "🆔", "cat": "developer", "tags": ["uuid", "guid", "v4", "v7", "random", "unique", "identifier"]},
      {"slug": "wcag-contrast", "name": "WCAG Contrast Checker", "desc": "Check the contrast ratio between two colors. Pass/fail verdict for WCAG AA and AAA at every text size.", "icon": "◐", "cat": "design", "tags": ["wcag", "contrast", "accessibility", "a11y", "color", "ratio"]},
      {"slug": "word-counter", "name": "Word Counter", "desc": "Count words, characters, sentences, paragraphs, and estimate reading + speaking time as you type.", "icon": "#", "cat": "text", "tags": ["word", "count", "character", "sentence", "paragraph", "reading", "writing"]},
      {"slug": "xml-formatter", "name": "XML Formatter", "desc": "Format and minify XML. Validate well-formedness with line and column on errors.", "icon": "&lt;/&gt;", "cat": "developer", "tags": ["xml", "format", "beautify", "minify", "validate", "well-formed"]},
      {"slug": "xml-to-json", "name": "XML ↔ JSON Converter", "desc": "Convert XML to JSON or JSON back to XML. Handles attributes, text nodes, and arrays sensibly.", "icon": "⇄", "cat": "data", "tags": ["xml", "json", "convert", "transform", "attributes", "data"]},
      {"slug": "yaml-json", "name": "YAML ↔ JSON Converter", "desc": "Convert between YAML and JSON in either direction. Useful for Kubernetes manifests, CI configs, and OpenAPI specs.", "icon": "🔁", "cat": "data", "tags": ["yaml", "json", "convert", "kubernetes", "config", "data"]},
      {"slug": "youtube-thumbnail", "name": "YouTube Thumbnail Downloader", "desc": "Paste any YouTube URL or video ID and grab every available thumbnail size — direct download links, no upload, no signup.", "icon": "▶", "cat": "media", "tags": ["youtube", "thumbnail", "preview", "image", "download", "video"]}
    ];

    const LBL_ALL = "All";
    const HERO_SUB_POST = "tools — fast, private, no signup. Just use them.";
    const CAT_LABELS = {"developer": "Developer", "text": "Text", "encoding": "Encoding", "data": "Data", "security": "Security", "media": "Media", "validation": "Validation", "design": "Design", "datetime": "Date &amp; Time", "math": "Math"};

    function renderFilters() {
      const counts = {};
      for (const t of TOOLS) counts[t.cat] = (counts[t.cat] || 0) + 1;
      const cats = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
      const wrap = document.getElementById('filters');
      let html = `<button class="filter-btn active" data-cat="all">${LBL_ALL} <span class="cnt">${TOOLS.length}</span></button>`;
      for (const c of cats) {
        const label = CAT_LABELS[c] || c.charAt(0).toUpperCase() + c.slice(1);
        html += `<button class="filter-btn" data-cat="${c}">${label} <span class="cnt">${counts[c]}</span></button>`;
      }
      wrap.innerHTML = html;
    }

    function renderHero() {
      document.getElementById('hero-sub').textContent = `${TOOLS.length} ${HERO_SUB_POST}`;
    }


    function render(tools) {
      const grid = document.getElementById('grid');
      const noResults = document.getElementById('no-results');
      if (tools.length === 0) { grid.innerHTML = ''; noResults.style.display = 'block'; return; }
      noResults.style.display = 'none';
      grid.innerHTML = tools.map(t => `
        <a class="card" href="/${t.slug}/" data-cat="${t.cat}">
          <div class="card-icon">${t.icon}</div>
          <h3>${t.name}</h3>
          <p>${t.desc}</p>
          <div class="card-meta"><span class="tag">${t.cat}</span></div>
        </a>
      `).join('');
    }

    function filterTools() {
      const q = document.getElementById('search').value.toLowerCase();
      const activeCat = document.querySelector('.filter-btn.active')?.dataset.cat || 'all';
      const filtered = TOOLS.filter(t => {
        const matchQ = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.tags.some(tag => tag.includes(q));
        const matchCat = activeCat === 'all' || t.cat === activeCat;
        return matchQ && matchCat;
      });
      render(filtered);
    }

    document.getElementById('filters').addEventListener('click', e => {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      filterTools();
    });

    function switchLang(lang) {
      window.location.href = lang ? `/${lang}/` : '/';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.querySelector('.theme-toggle').textContent = next === 'light' ? '🌙' : '☀️';
    }

    // Init
    const saved = localStorage.getItem('theme') || 'dark';
    if (saved === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      document.querySelector('.theme-toggle').textContent = '🌙';
    } else {
      document.querySelector('.theme-toggle').textContent = '☀️';
    }
    renderFilters();
    renderHero();
    render(TOOLS);

    // `/` keyboard shortcut to focus search
    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
        e.preventDefault();
        document.getElementById('search').focus();
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
    (function(){
      let deferred = null;
      const btn = document.getElementById('installBtn');
      if (!btn) return;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferred = e;
        btn.style.display = 'inline-block';
      });
      btn.addEventListener('click', async () => {
        if (!deferred) return;
        deferred.prompt();
        try { await deferred.userChoice; } catch(_){}
        deferred = null;
        btn.style.display = 'none';
      });
      window.addEventListener('appinstalled', () => { btn.style.display = 'none'; });
    })();
  </script>
</body>
