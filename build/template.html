<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Toolhub</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta property="og:title" content="{{TITLE}} — Toolhub">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://toolhub.software{{PATH}}">
  <meta property="og:image" content="https://toolhub.software/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://toolhub.software/og-image.png">
  <link rel="canonical" href="https://toolhub.software{{PATH}}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="alternate icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  {{ALTERNATE_LINKS}}
  <meta property="og:locale" content="{{OG_LOCALE}}">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": ["SoftwareApplication", "WebApplication"],
        "@id": "https://toolhub.software{{PATH}}#tool",
        "name": "{{TITLE}}",
        "description": "{{DESCRIPTION}}",
        "url": "https://toolhub.software{{PATH}}",
        "applicationCategory": "{{APP_CATEGORY}}",
        "applicationSubCategory": "{{APP_SUBCATEGORY}}",
        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "inLanguage": "{{INLANG}}",
        "isAccessibleForFree": true,
        "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"},
        "featureList": {{FEATURE_LIST}},
        "creator": {"@id": "https://toolhub.software#publisher"},
        "publisher": {"@id": "https://toolhub.software#publisher"}
      },
      {
        "@type": "Organization",
        "@id": "https://toolhub.software#publisher",
        "name": "Toolhub",
        "url": "https://toolhub.software",
        "sameAs": ["https://github.com/EveHetz/Toolhub"]
      },
      {
        "@type": "BreadcrumbList",
        "itemListElement": [
          {"@type": "ListItem", "position": 1, "name": "{{ALL_TOOLS}}", "item": "https://toolhub.software{{HOME}}"},
          {"@type": "ListItem", "position": 2, "name": "{{TITLE}}", "item": "https://toolhub.software{{PATH}}"}
        ]
      }
    ]
  }
  </script>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
      --accent-hover: #79c0ff; --green: #3fb950; --red: #f85149;
      --card-hover: #1c2129; --code-bg: #0a0d12;
    }
    [data-theme="light"] {
      --bg: #f6f8fa; --surface: #ffffff; --border: #d0d7de;
      --text: #1f2328; --text-muted: #656d76; --accent: #0969da;
      --accent-hover: #0550ae; --green: #1a7f37; --red: #cf222e;
      --card-hover: #f3f4f6; --code-bg: #f6f8fa;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }
    .header { padding: 1.25rem 1.5rem; max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; border-bottom: 1px solid var(--border); }
    .logo { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 0.5rem; align-items: center; }
    .lang-select, .theme-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.6rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
    .breadcrumb { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--text); }
    .tagline { color: var(--text-muted); font-size: 1.05rem; margin-bottom: 1.5rem; }
    .tool-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
    label { display: block; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.4rem; font-weight: 500; }
    textarea, input[type=text], input[type=number], input[type=password], input[type=url], select { width: 100%; padding: 0.65rem 0.8rem; background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.95rem; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; outline: none; }
    textarea { min-height: 140px; resize: vertical; }
    textarea:focus, input:focus, select:focus { border-color: var(--accent); }
    button { background: var(--accent); color: #fff; border: none; padding: 0.6rem 1.1rem; border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: background 0.15s; }
    button:hover { background: var(--accent-hover); }
    button.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    button.secondary:hover { background: var(--card-hover); }
    .button-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 0.75rem 0; }
    .row-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 700px) { .row-2col { grid-template-columns: 1fr; } }
    .output { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.8rem 1rem; font-family: ui-monospace, monospace; font-size: 0.92rem; min-height: 1.6em; word-break: break-all; white-space: pre-wrap; color: var(--text); }
    .output.error { color: var(--red); border-color: var(--red); }
    .output.success { color: var(--green); border-color: var(--green); }
    .output-row { display: flex; align-items: center; gap: 0.5rem; }
    .output-row .output { flex: 1; }
    .copy-btn { padding: 0.4rem 0.7rem; font-size: 0.8rem; }
    .meta { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.5rem; }
    .help { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-top: 1.5rem; }
    .help h2 { font-size: 1.05rem; margin-bottom: 0.5rem; color: var(--text); }
    .help h3 { font-size: 0.95rem; margin: 0.75rem 0 0.25rem; color: var(--text); }
    .help p, .help li { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.4rem; }
    .help ul, .help ol { padding-left: 1.25rem; }
    .related { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem; }
    .related a { padding: 0.3rem 0.7rem; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; font-size: 0.8rem; color: var(--text-muted); }
    .related a:hover { color: var(--accent); border-color: var(--accent); }
    .footer { text-align: center; padding: 1.5rem; color: var(--text-muted); font-size: 0.85rem; border-top: 1px solid var(--border); margin-top: 2rem; }
    .footer a { color: var(--text-muted); margin: 0 0.5rem; }
    .footer a:hover { color: var(--accent); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    th { color: var(--text-muted); font-weight: 600; font-size: 0.8rem; }
    code, pre { font-family: ui-monospace, monospace; }
    code { background: var(--code-bg); padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.88em; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text-muted); font-size: 0.75rem; }
    @keyframes flash { 0% { background: var(--green); color: #fff; } 100% { background: var(--accent); color: #fff; } }
    .copy-btn.copied { animation: flash 0.6s; }
  </style>
  <script defer data-domain="toolhub.software" src="https://plausible.io/js/script.js"></script>
  <link rel="stylesheet" href="/js/monetize.css">
  <script>
    /* Toolhub monetization config — fill these in once you have the IDs.
       Empty values keep ads OFF and the consent banner SUPPRESSED. */
    window.TOOLHUB_CONFIG = {
      adsenseClientId: "",
      adSlotIds: { content: "", footer: "", indexTop: "", indexBottom: "" },
      digitalOceanRef: "",
      githubSponsorsUrl: ""
    };
  </script>
  <script defer src="/js/monetize.js"></script>
</head>
<body>
  <header class="header">
    <a href="{{HOME}}" class="logo"><span>Tool</span>hub</a>
    <div class="header-actions">
      <select class="lang-select" onchange="if(this.value)location.href='/'+this.value+'/{{SLUG}}/'; else location.href='/{{SLUG}}/'">
        <option value="" {{SEL_EN}}>🇬🇧 EN</option>
        <option value="de" {{SEL_DE}}>🇩🇪 DE</option>
        <option value="es" {{SEL_ES}}>🇪🇸 ES</option>
        <option value="fr" {{SEL_FR}}>🇫🇷 FR</option>
        <option value="it" {{SEL_IT}}>🇮🇹 IT</option>
        <option value="pt" {{SEL_PT}}>🇧🇷 PT</option>
        <option value="pl" {{SEL_PL}}>🇵🇱 PL</option>
      </select>
      <button class="theme-toggle" onclick="toggleTheme()" title="{{THEME_TIP}}">🌙</button>
    </div>
  </header>
  <main class="container">
    <div class="breadcrumb"><a href="{{HOME}}">{{ALL_TOOLS}}</a> / {{TITLE}}</div>
    <h1>{{TITLE}}</h1>
    <p class="tagline">{{TAGLINE}}</p>
    {{TOOL_BODY}}
    <div class="ad-slot" data-slot="content"></div>
    {{HELP_BLOCK}}
    <div class="ad-slot" data-slot="footer"></div>
  </main>
  <footer class="footer">
    <p>© 2026 toolhub.software</p>
    <p><a href="{{PRIVACY}}">{{PRIVACY_LBL}}</a> · <a href="https://github.com/EveHetz/Toolhub">GitHub</a></p>
    <p data-toolhub-footer-extras></p>
  </footer>
  <script>
    function toggleTheme(){
      const d=document.documentElement;
      const next=d.getAttribute('data-theme')==='light'?'dark':'light';
      d.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.querySelector('.theme-toggle').textContent=next==='light'?'🌙':'☀️';
    }
    (function(){
      const saved=localStorage.getItem('theme')||'dark';
      if(saved==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').textContent='🌙';}
    })();
    function copyOutput(id, btn){
      const el=document.getElementById(id);
      const t=el.textContent||el.value||'';
      navigator.clipboard.writeText(t).then(()=>{
        btn.classList.add('copied');
        setTimeout(()=>btn.classList.remove('copied'),700);
      });
    }
  </script>
  {{TOOL_SCRIPT}}
</body>
</html>
