<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Toolhub</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta property="og:title" content="{{TITLE}} — Toolhub">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://toolhub.software{{PATH}}">
  <meta property="og:image" content="https://toolhub.software/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://toolhub.software/og-image.png">
  <link rel="canonical" href="https://toolhub.software{{PATH}}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="alternate icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#58a6ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  {{ALTERNATE_LINKS}}
  <meta property="og:locale" content="{{OG_LOCALE}}">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "{{SCHEMA_TYPE}}",
        "@id": "https://toolhub.software{{PATH}}#page",
        "name": "{{TITLE}}",
        "description": "{{DESCRIPTION}}",
        "url": "https://toolhub.software{{PATH}}",
        "inLanguage": "{{INLANG}}",
        "isPartOf": {"@id": "https://toolhub.software#site"},
        "publisher": {"@id": "https://toolhub.software#publisher"}
      },
      {
        "@type": "WebSite",
        "@id": "https://toolhub.software#site",
        "url": "https://toolhub.software",
        "name": "Toolhub",
        "publisher": {"@id": "https://toolhub.software#publisher"}
      },
      {
        "@type": "Organization",
        "@id": "https://toolhub.software#publisher",
        "name": "Toolhub",
        "url": "https://toolhub.software",
        "sameAs": ["https://github.com/EveHetz/Toolhub"]
      },
      {
        "@type": "BreadcrumbList",
        "itemListElement": [
          {"@type": "ListItem", "position": 1, "name": "{{ALL_TOOLS}}", "item": "https://toolhub.software{{HOME}}"},
          {"@type": "ListItem", "position": 2, "name": "{{TITLE}}", "item": "https://toolhub.software{{PATH}}"}
        ]
      }
    ]
  }
  </script>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
      --accent-hover: #79c0ff; --green: #3fb950; --red: #f85149;
      --card-hover: #1c2129; --code-bg: #0a0d12;
    }
    [data-theme="light"] {
      --bg: #f6f8fa; --surface: #ffffff; --border: #d0d7de;
      --text: #1f2328; --text-muted: #656d76; --accent: #0969da;
      --accent-hover: #0550ae; --green: #1a7f37; --red: #cf222e;
      --card-hover: #f3f4f6; --code-bg: #f6f8fa;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; min-height: 100vh; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }
    .header { padding: 1.25rem 1.5rem; max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; border-bottom: 1px solid var(--border); }
    .logo { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 0.5rem; align-items: center; }
    .lang-select, .theme-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.6rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .container { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem; }
    .breadcrumb { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; margin-bottom: 1rem; color: var(--text); }
    h2 { font-size: 1.25rem; margin: 2rem 0 0.5rem; color: var(--text); }
    h3 { font-size: 1.05rem; margin: 1.25rem 0 0.4rem; color: var(--text); }
    p, li { color: var(--text-muted); margin-bottom: 0.8rem; }
    ul, ol { padding-left: 1.5rem; margin-bottom: 0.8rem; }
    li { margin-bottom: 0.4rem; }
    code { background: var(--code-bg); padding: 0.1rem 0.35rem; border-radius: 3px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.88em; color: var(--text); }
    strong { color: var(--text); }
    .footer { text-align: center; padding: 1.5rem; color: var(--text-muted); font-size: 0.85rem; border-top: 1px solid var(--border); margin-top: 3rem; }
    .footer a { color: var(--text-muted); margin: 0 0.4rem; }
    .footer a:hover { color: var(--accent); }
    @media (max-width: 600px) {
      .container { padding: 1.25rem 1rem; }
      .header { padding: 0.75rem 1rem; }
      .logo { font-size: 1.2rem; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.1rem; }
    }
  </style>
  <script defer data-domain="toolhub.software" src="https://plausible.io/js/script.js"></script>
  <link rel="stylesheet" href="/js/monetize.css">
  <script>
    window.TOOLHUB_CONFIG = {
      deploy_env: "sandbox",
      adsenseClientId: "",
      adSlotIds: { content: "", footer: "", indexTop: "", indexBottom: "" },
      digitalOceanRef: "",
      githubSponsorsUrl: ""
    };
  </script>
  <script defer src="/js/monetize.js"></script>
</head>
<body>
  <header class="header">
    <a href="{{HOME}}" class="logo"><span>Tool</span>hub</a>
    <div class="header-actions">
      <select class="lang-select" onchange="if(this.value)location.href='/'+this.value+'/{{SLUG}}/'; else location.href='/{{SLUG}}/'">
        <option value="" {{SEL_EN}}>🇬🇧 EN</option>
        <option value="de" {{SEL_DE}}>🇩🇪 DE</option>
        <option value="es" {{SEL_ES}}>🇪🇸 ES</option>
        <option value="fr" {{SEL_FR}}>🇫🇷 FR</option>
        <option value="it" {{SEL_IT}}>🇮🇹 IT</option>
        <option value="pt" {{SEL_PT}}>🇧🇷 PT</option>
        <option value="pl" {{SEL_PL}}>🇵🇱 PL</option>
        <option value="ja" {{SEL_JA}}>🇯🇵 JA</option>
        <option value="nl" {{SEL_NL}}>🇳🇱 NL</option>
      </select>
      <button class="theme-toggle" onclick="toggleTheme()" title="{{THEME_TIP}}">🌙</button>
    </div>
  </header>
  <main class="container">
    <div class="breadcrumb"><a href="{{HOME}}">{{ALL_TOOLS}}</a> / {{TITLE}}</div>
    <h1>{{H1}}</h1>
    {{BODY}}
  </main>
  <footer class="footer">
    <p>© 2026 toolhub.software</p>
    <p><a href="{{PRIVACY}}">{{PRIVACY_LBL}}</a> · <a href="{{DATA_HANDLING}}">{{DATA_HANDLING_LBL}}</a> · <a href="{{AFFILIATE_DISCLOSURE}}">{{AFFILIATE_DISCLOSURE_LBL}}</a> · <a href="{{ABOUT}}">{{ABOUT_LBL}}</a> · <a href="{{CONTACT}}">{{CONTACT_LBL}}</a> · <a href="{{FOR_SCHOOLS}}">{{FOR_SCHOOLS_LBL}}</a> · <a href="https://github.com/EveHetz/Toolhub">GitHub</a></p>
  </footer>
  <script>
    function toggleTheme(){
      const d=document.documentElement;
      const next=d.getAttribute('data-theme')==='light'?'dark':'light';
      d.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.querySelector('.theme-toggle').textContent=next==='light'?'🌙':'☀️';
    }
    (function(){
      const saved=localStorage.getItem('theme')||'dark';
      if(saved==='light'){document.documentElement.setAttribute('data-theme','light');document.querySelector('.theme-toggle').textContent='🌙';}
    })();
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
