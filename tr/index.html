    const LBL_ALL = "Tümü";
    const HERO_SUB_POST = "araç — hızlı, gizli, kayıt yok. Hemen kullanılabilir.";
    const CAT_LABELS = {"developer": "Geliştirici", "text": "Metin", "encoding": "Kodlama", "data": "Veri", "security": "Güvenlik", "media": "Medya", "validation": "Doğrulama", "design": "Tasarım", "datetime": "Tarih & saat", "math": "Matematik"};

    function renderFilters() {
      const counts = {};
      for (const t of TOOLS) counts[t.cat] = (counts[t.cat] || 0) + 1;
      const cats = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
      const wrap = document.getElementById('filters');
      let html = `<button class="filter-btn active" data-cat="all">${LBL_ALL} <span class="cnt">${TOOLS.length}</span></button>`;
      for (const c of cats) {
        const label = CAT_LABELS[c] || c.charAt(0).toUpperCase() + c.slice(1);
        html += `<button class="filter-btn" data-cat="${c}">${label} <span class="cnt">${counts[c]}</span></button>`;
      }
      wrap.innerHTML = html;
    }

    function renderHero() {
      document.getElementById('hero-sub').textContent = `${TOOLS.length} ${HERO_SUB_POST}`;
    }


    function render(tools) {
      const grid = document.getElementById('grid');
      const noResults = document.getElementById('no-results');
      if (tools.length === 0) { grid.innerHTML = ''; noResults.style.display = 'block'; return; }
      noResults.style.display = 'none';
      grid.innerHTML = tools.map(t => `
        <a class="card" href="/tr/${t.slug}/" data-cat="${t.cat}">
          <div class="card-icon">${t.icon}</div>
          <h3>${t.name}</h3>
          <p>${t.desc}</p>
          <div class="card-meta"><span class="tag">${t.cat}</span></div>
        </a>
      `).join('');
    }

    function filterTools() {
      const q = document.getElementById('search').value.toLowerCase();
      const activeCat = document.querySelector('.filter-btn.active')?.dataset.cat || 'all';
      const filtered = TOOLS.filter(t => {
        const matchQ = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.tags.some(tag => tag.includes(q));
        const matchCat = activeCat === 'all' || t.cat === activeCat;
        return matchQ && matchCat;
      });
      render(filtered);
    }

    document.getElementById('filters').addEventListener('click', e => {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      filterTools();
    });

    function switchLang(lang) {
      window.location.href = lang ? `/${lang}/` : '/';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.querySelector('.theme-toggle').textContent = next === 'light' ? '🌙' : '☀️';
    }

    // Init
    const saved = localStorage.getItem('theme') || 'dark';
    if (saved === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      document.querySelector('.theme-toggle').textContent = '🌙';
    } else {
      document.querySelector('.theme-toggle').textContent = '☀️';
    }
    renderFilters();
    renderHero();
    render(TOOLS);

    // `/` keyboard shortcut to focus search
    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
        e.preventDefault();
        document.getElementById('search').focus();
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
    (function(){
      let deferred = null;
      const btn = document.getElementById('installBtn');
      if (!btn) return;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferred = e;
        btn.classList.add('visible');
      });
      btn.addEventListener('click', async () => {
        if (!deferred) return;
        deferred.prompt();
        try { await deferred.userChoice; } catch(_){}
        deferred = null;
        btn.classList.remove('visible');
      });
      window.addEventListener('appinstalled', () => { btn.classList.remove('visible'); });
    })();
  </script>
